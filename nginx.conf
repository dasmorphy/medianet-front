server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compresión
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Fallback de rutas para la SPA (Angular Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy reverso hacia los microservicios (coincide con environment.prod.ts).
    # Los nombres de host (clientes-service / cuentas-service) son los del docker-compose.
    location /api/clientes-service/ {
        proxy_pass http://clientes-service:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/cuentas-service/ {
        proxy_pass http://cuentas-service:8081/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Cache de estáticos
    location ~* \.(?:js|css|woff2?|eot|ttf|otf|svg|png|jpg|jpeg|gif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }
}
