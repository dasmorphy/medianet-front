<div class="page-container">
  <div class="page-header">
    <h1 class="m-0"><mat-icon class="align-middle">swap_horiz</mat-icon> Movimientos</h1>
    <button mat-raised-button color="primary" (click)="registrar()" [disabled]="cuentas.length === 0">
      <mat-icon>add</mat-icon> Nuevo movimiento
    </button>
  </div>

  <mat-progress-bar *ngIf="cargando" mode="indeterminate"></mat-progress-bar>

  <div class="table-card">
    <table mat-table [dataSource]="movimientos" class="mat-elevation-z0">
      <ng-container matColumnDef="fecha">
        <th mat-header-cell *matHeaderCellDef>Fecha</th>
        <td mat-cell *matCellDef="let m">{{ m.fecha | date:'dd/MM/yyyy HH:mm' }}</td>
      </ng-container>

      <ng-container matColumnDef="numeroCuenta">
        <th mat-header-cell *matHeaderCellDef>N° Cuenta</th>
        <td mat-cell *matCellDef="let m">{{ m.numeroCuenta }}</td>
      </ng-container>

      <ng-container matColumnDef="tipoMovimiento">
        <th mat-header-cell *matHeaderCellDef>Tipo</th>
        <td mat-cell *matCellDef="let m">{{ m.tipoMovimiento }}</td>
      </ng-container>

      <ng-container matColumnDef="valor">
        <th mat-header-cell *matHeaderCellDef>Valor</th>
        <td mat-cell *matCellDef="let m" [class]="m.valor < 0 ? 'estado-inactivo' : 'estado-activo'">
          {{ m.valor | currency:'USD':'symbol':'1.2-2' }}
        </td>
      </ng-container>

      <ng-container matColumnDef="saldo">
        <th mat-header-cell *matHeaderCellDef>Saldo</th>
        <td mat-cell *matCellDef="let m">{{ m.saldo | currency:'USD':'symbol':'1.2-2' }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columnas"></tr>
      <tr mat-row *matRowDef="let row; columns: columnas"></tr>
    </table>

    <p *ngIf="!cargando && movimientos.length === 0" class="text-center text-muted py-4 m-0">
      No hay movimientos registrados.
    </p>
  </div>
</div>
