<h2 mat-dialog-title>Registrar movimiento</h2>

<form [formGroup]="form" (ngSubmit)="guardar()">
  <mat-dialog-content>
    <div class="row g-2">
      <div class="col-12">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Cuenta</mat-label>
          <mat-select formControlName="numeroCuenta">
            <mat-option *ngFor="let c of data.cuentas" [value]="c.numeroCuenta">
              {{ c.numeroCuenta }} — {{ c.tipoCuenta }}
            </mat-option>
          </mat-select>
          <mat-error *ngIf="f['numeroCuenta'].hasError('required')">Requerido</mat-error>
        </mat-form-field>
      </div>

      <div class="col-12 col-md-6">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Operación</mat-label>
          <mat-select formControlName="operacion">
            <mat-option *ngFor="let o of operaciones" [value]="o">{{ o }}</mat-option>
          </mat-select>
        </mat-form-field>
      </div>

      <div class="col-12 col-md-6">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Valor</mat-label>
          <input matInput type="number" formControlName="valor" />
          <span matPrefix>$&nbsp;</span>
          <mat-error *ngIf="f['valor'].hasError('required')">Requerido</mat-error>
          <mat-error *ngIf="f['valor'].hasError('min')">Debe ser mayor que 0</mat-error>
        </mat-form-field>
      </div>

      <div class="col-12">
        <p class="text-muted small m-0">
          <mat-icon class="hint-icon">info</mat-icon>
          El depósito suma al saldo (Crédito) y el retiro lo descuenta (Débito).
        </p>
      </div>
    </div>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancelar()">Cancelar</button>
    <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
      Registrar
    </button>
  </mat-dialog-actions>
</form>
