<div class="page-container">
  <div class="page-header">
    <h1 class="m-0"><mat-icon class="align-middle">account_balance</mat-icon> Cuentas</h1>
    <button mat-raised-button color="primary" (click)="abrirFormulario()">
      <mat-icon>add</mat-icon> Nueva cuenta
    </button>
  </div>

  <mat-progress-bar *ngIf="cargando" mode="indeterminate"></mat-progress-bar>

  <div class="table-card">
    <table mat-table [dataSource]="cuentas" class="mat-elevation-z0">
      <ng-container matColumnDef="numeroCuenta">
        <th mat-header-cell *matHeaderCellDef>N° Cuenta</th>
        <td mat-cell *matCellDef="let c">{{ c.numeroCuenta }}</td>
      </ng-container>

      <ng-container matColumnDef="tipoCuenta">
        <th mat-header-cell *matHeaderCellDef>Tipo</th>
        <td mat-cell *matCellDef="let c">{{ c.tipoCuenta }}</td>
      </ng-container>

      <ng-container matColumnDef="saldoInicial">
        <th mat-header-cell *matHeaderCellDef>Saldo inicial</th>
        <td mat-cell *matCellDef="let c">{{ c.saldoInicial | currency:'USD':'symbol':'1.2-2' }}</td>
      </ng-container>

      <ng-container matColumnDef="cliente">
        <th mat-header-cell *matHeaderCellDef>Cliente</th>
        <td mat-cell *matCellDef="let c">{{ nombreCliente(c.clienteId) }}</td>
      </ng-container>

      <ng-container matColumnDef="estado">
        <th mat-header-cell *matHeaderCellDef>Estado</th>
        <td mat-cell *matCellDef="let c">
          <span [class]="c.estado ? 'estado-activo' : 'estado-inactivo'">
            {{ c.estado ? 'Activo' : 'Inactivo' }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef class="text-end">Acciones</th>
        <td mat-cell *matCellDef="let c" class="text-end">
          <button mat-icon-button color="primary" matTooltip="Editar" (click)="abrirFormulario(c)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" matTooltip="Eliminar" (click)="eliminar(c)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columnas"></tr>
      <tr mat-row *matRowDef="let row; columns: columnas"></tr>
    </table>

    <p *ngIf="!cargando && cuentas.length === 0" class="text-center text-muted py-4 m-0">
      No hay cuentas registradas.
    </p>
  </div>
</div>
