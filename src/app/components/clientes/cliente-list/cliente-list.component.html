<div class="page-container">
  <div class="page-header">
    <h1 class="m-0"><mat-icon class="align-middle">people</mat-icon> Clientes</h1>
    <button mat-raised-button color="primary" (click)="abrirFormulario()">
      <mat-icon>add</mat-icon> Nuevo cliente
    </button>
  </div>

  <mat-progress-bar *ngIf="cargando" mode="indeterminate"></mat-progress-bar>

  <div class="table-card">
    <table mat-table [dataSource]="clientes" class="mat-elevation-z0">
      <ng-container matColumnDef="clienteId">
        <th mat-header-cell *matHeaderCellDef>Cliente ID</th>
        <td mat-cell *matCellDef="let c">{{ c.clienteId }}</td>
      </ng-container>

      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let c">{{ c.nombre }}</td>
      </ng-container>

      <ng-container matColumnDef="identificacion">
        <th mat-header-cell *matHeaderCellDef>Identificación</th>
        <td mat-cell *matCellDef="let c">{{ c.identificacion }}</td>
      </ng-container>

      <ng-container matColumnDef="telefono">
        <th mat-header-cell *matHeaderCellDef>Teléfono</th>
        <td mat-cell *matCellDef="let c">{{ c.telefono }}</td>
      </ng-container>

      <ng-container matColumnDef="estado">
        <th mat-header-cell *matHeaderCellDef>Estado</th>
        <td mat-cell *matCellDef="let c">
          <span [class]="c.estado ? 'estado-activo' : 'estado-inactivo'">
            {{ c.estado ? 'Activo' : 'Inactivo' }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef class="text-end">Acciones</th>
        <td mat-cell *matCellDef="let c" class="text-end">
          <button mat-icon-button color="primary" matTooltip="Editar" (click)="abrirFormulario(c)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" matTooltip="Eliminar" (click)="eliminar(c)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columnas"></tr>
      <tr mat-row *matRowDef="let row; columns: columnas"></tr>
    </table>

    <p *ngIf="!cargando && clientes.length === 0" class="text-center text-muted py-4 m-0">
      No hay clientes registrados.
    </p>
  </div>
</div>
